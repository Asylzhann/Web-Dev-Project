<div class="login-wrapper">
  <div class="login-container">
    <h1>🔐 Welcome Back!</h1>
    <p class="subtitle">Please enter your credentials to access your account.</p>

    <form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">
      <div class="input-box">
        <i class="bx bxs-envelope"></i>
        <input type="email" id="email" name="email" [(ngModel)]="email" placeholder="Email" required>
      </div>

      <div class="input-box">
        <i class="bx bxs-lock-alt"></i>
        <input type="password" id="password" name="password" [(ngModel)]="password" placeholder="Password" required>
      </div>

      <button type="submit" class="btn-login" [disabled]="!loginForm.valid">Login</button>

      <button type="button" class="btn-logout" (click)="onLogout()" *ngIf="authService.isLoggedIn()">Logout</button>

      <div class="register-link">
        <p>Don't have an account? <a [routerLink]="['/register']">Sign up</a></p>
      </div>

      <div *ngIf="error" class="error-message">
        ❌ {{ error }}
      </div>
    </form>
  </div>
</div>
