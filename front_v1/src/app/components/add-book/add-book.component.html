<div class="container">  
  <div class="addContainer">
    <h2 class="form-title">📖 Add a New Book</h2>
    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()" class="book-form">
      <div class="form-group">
        <label for="title"><i class="fas fa-book"></i> Title:</label>
        <input type="text" id="title" formControlName="title" class="form-control" required placeholder="Enter book title">
      </div>
      
      <div class="form-group">
        <label for="author"><i class="fas fa-user"></i> Author:</label>
        <input type="text" id="author" formControlName="author" class="form-control" required placeholder="Enter author name">
      </div>
      
      <div class="form-group">
        <label for="isbn"><i class="fas fa-barcode"></i> ISBN:</label>
        <input type="text" id="isbn" formControlName="isbn" class="form-control" required placeholder="Enter ISBN">
      </div>

      <div class="form-group">
        <label for="pictureUrl"><i class="fas fa-image"></i> Book Cover:</label>
        <input type="file" id="pictureUrl" formControlName="pictureUrl" class="form-control">
      </div>

      <button type="submit" class="btn" [disabled]="!bookForm.valid">
        <i class="fas fa-plus-circle"></i> Add Book
      </button>
    </form>
  </div>
</div>
